<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-image: linear-gradient(to right, pink, purple);padding-top: 2em;" width="100%">
    <div width="50px" height="200px" style="background-color: whitesmoke; width: 400px; min-height: 300px; margin: auto; padding: 2em; box-shadow:  0px 10px 20px rgba(190, 50, 100, 0.04)">
        <h2>Registration Form</h2>
        <form action="success.html" style="justify-content: center;">
            <div style="display: flex; flex: nowrap; justify-content: space-around;padding-bottom: 0.5em;">
                <div>
                    <label for="First Name">First Name</label>
                    <div>
                        <input type="text" placeholder="Johnny"  maxlength="14" minlength="3" style="padding-top: 0.3em; padding-bottom: 0.3em;">
                    </div>
                </div>
                <div>
                    <label for="Last Name">Last Name</label>
                    <div>
                        <input type="text" placeholder="Nelson" maxlength="14" minlength="3" name="Last Name" id="Lname"style="padding-top: 0.3em; padding-bottom: 0.3em;">
                    </div>
                </div>
            </div>
            <div style="display: flex; flex: nowrap; justify-content: space-around;padding-bottom: 0.5em;">
                <div>
                    <label for="Birthday">Birthday</label>
                    <div>
                        <input type="date" max="2003-01-01" min="1983-01-01" name="" id="" style="padding-left: 1em; padding-right: 3.7em;padding-top: 0.3em; padding-bottom: 0.3em;">
                    </div>
                </div>
                <div style="padding-right: 2.5em;padding-top: 0.2em;">
                    <label for="Gender">Gender</label>
                    <div>
                        <input type="radio" name="Gender" id="">
                        <label for="Male">Male</label>
                        <input type="radio" name="Gender" id="Female">
                        <label for="Female">Female</label>
                    </div>
                </div>
            </div>
            <div style="display: flex; flex: nowrap; justify-content: space-around;padding-bottom: 0.5em;">
                <div>
                    <label for="Email">Email</label>
                    <div>
                        <input type="email" name="email" id="email" style="padding-top: 0.3em; padding-bottom: 0.3em;" required>
                    </div>
                </div>
                <div>
                    <label for="Phone Number">Phone Number</label>
                    <div>
                        <input type="tel" name="" id="" required pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" placeholder="123-32-345" style="padding-top:0.3em; padding-bottom: 0.3em;">
                    </div>
                </div>
            </div>
            <div style="padding-left: 0.8em; padding-bottom: 0.5em;">
                <label for="Subject">Subject</label>
                <div>
                  <select name="" id="" style="padding-top: 0.3em; padding-bottom: 0.3em; padding-right: 15em;">
                    <option value="">Choose option</option>
                    <option name="Maths" id="">Mathematics</option>
                    <option name="English" id="">English</option>
                    <option name="F-end" id="">Frontend</option>
                    </select>
                </div>
            </div>
            <div style="padding-left: 0.8em; padding-bottom: 0.5em;">
                <label for="favourite color">Favourite Color</label>
                <div><input type="color" name="" id=""></div>
            </div>
            <div style="padding-left: 0.8em;">
                <a href="success.html"><button type="submit" id="btn">Submit</button></a>
            </div>
        </form>
    </div>
    
</body>
</html>
